name: Bug 反馈（使用中文）
description: 识别错误、操作异常、连接错误等
labels: [“bug”]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 在提问之前...
      description: |
        请确认自己完成了要求之后再进行勾选
      options:
        - label: 我理解 Issue 是用于反馈和解决问题的，而非吐槽评论区，将尽可能提供更多信息帮助问题解决
          required: true
        - label: 我填写了简短且清晰明确的标题，以便开发者在翻阅 Issue 列表时能快速确定大致问题。而不是”一个建议”、”卡住了”等
          required: true
        - label: 我使用的是当前更新版本的最新版，且已查看版本发布至今和 Pull Requests 中尚未发布的更新内容，并未提及该 Bug 已被修复的情况
          required: true
        - label: 我已检查了置顶议题（Pinned Issue）（公告）、活跃议题（Open Issue）、已关闭议题（Closed Issue），确认我的问题未被提及
          required: true
        - label: 我已将游戏切换到**简体中文**界面（MDA 目前仅适配中文界面，其他语言可能导致识别错误）
          required: true
  - type: textarea
    id: describe
    attributes:
      label: 问题描述
      description: 描述问题时请尽可能详细，包括具体是哪个任务/功能出现问题
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: 版本信息
      description: |
        请提供 MDA 版本号（可在界面左下角或关于页面查看）
      placeholder: |
        MDA 版本: 例如 1.0.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志和配置文件
      description: |
        **请按以下步骤打包日志并上传：**

        1. 进入 **「设置」→「调试」**，勾选 **「保存调试图像」**（每次启动需重新开启）
        2. **只运行有问题的那一个任务**，复现问题后立即停止
        3. 点击右下角 **「运行日志」** 旁的 **「导出日志」** 图标
        4. 在弹出的 `debug` 文件夹中，找到生成的压缩文件并**解压**
        5. 将同目录下的 **`vision` 文件夹**拖入解压后的文件夹中
        6. 确认文件夹内包含：`vision` 文件夹、`config` 文件夹、`XXXX-XX-XX-X.log`、`go-service.log`、`maafw.log`
        7. 将整个文件夹**重新压缩为 ZIP** 并上传

        **请直接将完整的 ZIP 拖拽进来，而非自己裁切或复制的片段**
      placeholder: |
        请确认已按上述步骤打包日志
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: 配置信息
      description: |
        请说明：
        - 操作系统及版本
        - 模拟器品牌及版本
        - 模拟器分辨率、DPI、帧率
        - GPU 加速推理是否开启（若开启请提供 GPU 型号）
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: |
        可上传屏幕截图或录制以帮助解释你的问题，包括但不限于：
        - MDA 软件截图
        - 游戏画面截图
        - debug 目录下按功能分类的错误图片（如有）

        若是**识别相关问题**，请尽可能提供模拟器自带的截图工具截取的无遮挡的**原图**（或通过 adb 截取原图）
        用其他工具（如 QQ/微信）截取的图片包含窗口边框且长宽比、分辨率不固定，不利于排查问题
        若文件体积过大可压缩后再上传
    validations:
      required: false
  - type: textarea
    id: others
    attributes:
      label: 还有别的吗？
      description: |
        任何能让我们对你所遇到的问题有更多了解的东西
    validations:
      required: false
