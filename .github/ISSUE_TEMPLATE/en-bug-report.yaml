name: Bug Report (in English)
description: >-
  Recognition errors, operation abnormalities,
  connection errors, etc.
labels: ["bug"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before raising the issue...
      description: |
        Please ensure that you have completed the requirements before checking the box.
      options:
        - label: >-
            I understand that Issues are for feedback and problem solving,
            not trolling the comments section, and will provide as
            much information as possible to help solve the problem.
          required: true
        - label: >-
            I filled in a short, clear title
            so that developers could quickly identify the general problem
            when going through the issue list.
            Instead of "Some suggestions", "Stuck", etc.
          required: true
        - label: >-
            I am using the latest version of the current update and have reviewed
            both the updates released so far and the unreleased changes in the Pull Requests,
            there is no mention of the bug being fixed.
          required: true
        - label: >-
            I have reviewed the Pinned issue (Announcements), Open issues, and Closed issues
            to ensure that my issue has not been mentioned.
          required: true
        - label: >-
            I have switched the game to **Simplified Chinese** interface
            (MDA currently only supports Chinese interface,
            other languages may cause recognition errors)
          required: true
  - type: textarea
    id: describe
    attributes:
      label: Description
      description: Please provide a detailed description of your issue, including which specific task/function has the problem.
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Version Information
      description: |
        Please provide the MDA version number (can be found in the bottom-left corner of the interface or the About page).
      placeholder: |
        MDA Version: e.g. 1.0.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log and config files
      description: |
        **Please follow these steps to package and upload logs:**

        1. Go to **Settings → Debug**, check **Save Debug Images** (needs to be re-enabled each time you start)
        2. **Only run the task that has the problem**, stop immediately after reproducing the issue
        3. Click the **Export Log** icon next to **Run Log** in the bottom-right corner
        4. In the `debug` folder that appears, find the generated archive and **extract** it
        5. Drag the **`vision` folder** from the same directory into the extracted folder
        6. Verify the folder contains: `vision` folder, `config` folder, `XXXX-XX-XX-X.log`, `go-service.log`, `maafw.log`
        7. **Re-compress** the entire folder into a ZIP and upload

        **Please drag and drop the complete ZIP file, not your own cuttings or copies**
      placeholder: |
        Please confirm you have packaged the logs as described above
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: Configuration information
      description: |
        Please specify:
        - Operating system and version
        - Emulator brand and version
        - Emulator resolution, DPI, and frame rate
        - Whether GPU accelerated inference is enabled (if so, provide GPU model)
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: |
        Upload screenshots or recordings to help explain your problem, including but not limited to:
        - MDA software screenshots
        - Game screen screenshots
        - Error images from functionally categorized folders in debug directory (if any)

        If the problem is **recognition related**, please provide
        the **original image** taken by the emulator's own screenshot tool (or via adb).

        Screenshots taken with other tools may contain window frames
        and their aspect ratio and resolution are inconsistent,
        which makes it harder to debug.

        If the file size is too large, compress it before uploading.
    validations:
      required: false
  - type: textarea
    id: others
    attributes:
      label: Anything else?
      description: |
        Anything that will give us more insight into the problem you are having.
    validations:
      required: false
